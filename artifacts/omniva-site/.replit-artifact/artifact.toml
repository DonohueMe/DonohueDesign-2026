kind = "web"
previewPath = "/omniva-site/"
title = "Donohue Design — Production Site"
version = "1.0.0"
id = "artifacts/omniva-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/omniva-site/" ]
localPort = 18328

[services.development]
run = "pnpm --filter @workspace/omniva-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniva-site", "run", "build" ]
publicDir = "artifacts/omniva-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18328"
BASE_PATH = "/omniva-site/"
