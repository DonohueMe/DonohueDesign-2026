kind = "web"
previewPath = "/"
title = "Donohue Design"
version = "1.0.0"
id = "artifacts/omniva-design"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24223

[services.development]
run = "pnpm --filter @workspace/omniva-design run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniva-design", "run", "build" ]
publicDir = "artifacts/omniva-design/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24223"
BASE_PATH = "/"
